services:
  jenkins:
    build: .
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"    # Web UI
      - "50000:50000"  # Agent JNLP port
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # lets Jenkins spawn Docker agents

volumes:
  jenkins_home:
